# ------------------------------------------------------------------
# Predbat configuration for Corab Encor Hybrid (SolaX X3 G4)
# Control via raw Modbus TCP — no SolaX Modbus integration needed.
# ------------------------------------------------------------------
---
pred_bat:
  module: predbat
  class: PredBat

  # Sets the prefix for all created entities in HA
  prefix: predbat

  # Poland timezone
  timezone: Europe/Warsaw

  # DELETE this line once you have verified everything is working
  template: true

  # Currency (Polish złoty)
  currency_symbols:
    - 'zł'
    - 'gr'

  threads: auto

  # ============================================================
  # INVERTER DEFINITION
  # Custom definition — no SolaX Modbus integration required.
  # Control is via script.corab_remote_control (see scripts.yaml)
  # which writes directly to VPP RAM registers over Modbus TCP.
  # ============================================================
  inverter_type: SOLAX
  num_inverters: 1

  inverter:
    name: "Corab Encor Hybrid (SolaX X3 G4 via raw Modbus)"
    has_rest_api: False
    has_mqtt_api: False
    has_service_api: True
    output_charge_control: "power"
    charge_control_immediate: True
    has_charge_enable_time: False
    has_discharge_enable_time: False
    has_target_soc: False
    has_reserve_soc: False
    has_timed_pause: False
    charge_time_format: "S"
    charge_time_entity_is_option: False
    soc_units: "%"
    num_load_entities: 1
    has_ge_inverter_mode: False
    time_button_press: False
    clock_time_format: "%Y-%m-%d %H:%M:%S"
    write_and_poll_sleep: 4
    has_time_window: False
    support_charge_freeze: True
    support_discharge_freeze: True
    has_idle_time: False
    can_span_midnight: True
    charge_discharge_with_rate: True
    target_soc_used_for_discharge: False

  # ============================================================
  # INVERTER CAPACITY & LIMITS
  # ⚠ Adjust these to match your actual hardware:
  #   battery_rate_max: max charge/discharge W (check BMS label)
  #   soc_max: usable battery capacity in kWh
  #   inverter_limit: max AC inverter power in W
  # ============================================================
  battery_rate_max:
    - 3600

  soc_max:
    - 5.8

  inverter_limit:
    - 6000

  inverter_limit_charge:
    - 3600

  inverter_limit_discharge:
    - 3600

  # ============================================================
  # SENSOR MAPPINGS
  # ============================================================

  # Grid import/export energy today (kWh)
  import_today:
    - sensor.corab_consumption_from_grid_today

  export_today:
    - sensor.corab_feed_in_energy_today

  # PV production today (kWh)
  pv_today:
    - sensor.corab_today_pv_production

  # Real-time power sensors (W)
  pv_power:
    - sensor.corab_pv1_power
    - sensor.corab_pv2_power

  grid_power:
    - sensor.corab_grid_power

  # sensor.corab_grid_power: positive = import, negative = export
  grid_power_invert:
    - false

  load_power:
    - sensor.corab_house_load

  # Battery state of charge (%)
  soc_percent:
    - sensor.corab_battery_soc

  # Battery power (W): positive = charging, negative = discharging
  battery_power:
    - sensor.corab_battery_power

  battery_power_invert:
    - false

  battery_temperature:
    - sensor.corab_battery_temperature

  # ============================================================
  # CONTROL SERVICES
  # All four call script.corab_remote_control which writes to
  # the VPP RAM registers (0x0100–0x0106) directly over Modbus TCP.
  # ============================================================
  charge_start_service:
    - service: script.corab_remote_control
      power: "{power}"
      operation: "Force Charge"

  discharge_start_service:
    - service: script.corab_remote_control
      power: "{power}"
      operation: "Force Discharge"

  charge_stop_service:
    - service: script.corab_remote_control
      operation: "Disabled"

  discharge_stop_service:
    - service: script.corab_remote_control
      operation: "Disabled"

  charge_freeze_service:
    - service: script.corab_remote_control
      operation: "Freeze Charge"

  discharge_freeze_service:
    - service: script.corab_remote_control
      operation: "Freeze Discharge"

  # ============================================================
  # SOLAR FORECAST — Solcast HA integration
  # Auto-matches the Solcast integration sensor names.
  # To use the cloud API instead, set solcast_host and
  # solcast_api_key below and comment out the four re: entries.
  # ============================================================
  #solcast_host: 'https://api.solcast.com.au/'
  #solcast_api_key: 'YOUR_KEY_HERE'
  #solcast_poll_hours: 8

  pv_forecast_today:    re:(sensor.(solcast_|)(pv_forecast_|)forecast_today)
  pv_forecast_tomorrow: re:(sensor.(solcast_|)(pv_forecast_|)forecast_tomorrow)
  pv_forecast_d3:       re:(sensor.(solcast_|)(pv_forecast_|)forecast_(day_3|d3))
  pv_forecast_d4:       re:(sensor.(solcast_|)(pv_forecast_|)forecast_(day_4|d4))

  # ============================================================
  # ENERGY TARIFF — fixed rates (Pstryk / PGE)
  # Update these values to match your current tariff.
  # For dynamic Pstryk pricing, uncomment metric_octopus_import /
  # metric_octopus_export and point them at your Pstryk sensors.
  # ============================================================
  rates_import:
    - start: "00:00:00"
      end: "24:00:00"
      rate: 0.62

  rates_export:
    - start: "00:00:00"
      end: "24:00:00"
      rate: 0.20

  #metric_octopus_import: 're:(sensor.pstryk_[a-z_]+_current_rate)'
  #metric_octopus_export: 're:(sensor.pstryk_[a-z_]+_export_current_rate)'

  # ============================================================
  # CLOCK & MISC
  # ============================================================
  inverter_clock_skew_start: 0
  inverter_clock_skew_end: 0
  inverter_clock_skew_discharge_start: 0
  inverter_clock_skew_discharge_end: 0
  clock_skew: 0

  num_cars: 0

  # EV charger (Feyree 11kW DLB) — uncomment if you want Predbat
  # to account for EV charging load
  #car_charging_energy: 'sensor.feyree_charge_added_kwh'

  # Days of load history to average (7 = same day last week)
  days_previous:
    - 7

  days_previous_weight:
    - 1

  # Forecast horizon in hours
  forecast_hours: 48

  battery_scaling:
    - 1.0

  import_export_scaling: 1.0

  # Sets maximum period of zero load before the gap is filled
  load_filter_threshold: 30
